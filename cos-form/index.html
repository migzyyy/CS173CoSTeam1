<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate of Service</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Certificate of Service</h1>
    </div>

    <form id="cosForm">
      <div class="section">
        <div class="section-title">Personal Information</div>
        <div class="form-row">
          <div class="form-group">
            <label for="month">For the Month of:</label>
            <select id="month" name="month" required>
              <option value="">Select Month</option>
              <option value="January">January</option>
              <option value="February">February</option>
              <option value="March">March</option>
              <option value="April">April</option>
              <option value="May">May</option>
              <option value="June">June</option>
              <option value="July">July</option>
              <option value="August">August</option>
              <option value="September">September</option>
              <option value="October">October</option>
              <option value="November">November</option>
              <option value="December">December</option>
            </select>
          </div>
          <div class="form-group">
            <label for="year">Year:</label>
            <input type="number" id="year" name="year" min="2020" max="2040" value="2026" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="position">Position:</label>
            <input type="text" id="position" name="position" placeholder="Enter your position" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="college">College/School of:</label>
            <input type="text" id="college" name="college" placeholder="Enter college/school name" required>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Service Activities</div>
        <div class="activities-container" id="activitiesContainer">
          <div class="activity-card" data-index="0">
            <button type="button" class="remove-btn" onclick="removeActivity(this)" style="display: none;">&times;</button>
            <div class="form-row">
              <div class="form-group">
                <label>Activities (research, extension, etc.):</label>
                <input type="text" name="activity[]" placeholder="Describe the activity" required>
              </div>
              <div class="form-group" style="max-width: 200px;">
                <label>Hours per Week:</label>
                <input type="number" name="hours[]" min="0" max="168" placeholder="0" required>
              </div>
            </div>
          </div>
        </div>
        <button type="button" class="add-activity-btn" onclick="addActivity()">
          <span>+</span> Add Another Activity
        </button>
      </div>

      <div class="section">
        <div class="section-title">Summary</div>
        <div class="form-row">
          <div class="form-group">
            <label for="totalHours">Total Hours for the Month:</label>
            <input type="number" id="totalHours" name="totalHours" placeholder="Auto-calculated" readonly>
          </div>
        </div>
      </div>

      <div class="declaration">
        <p id="declarationText">I hereby certify upon my honor that I have rendered full service for the month of <strong id="declarationPreview">_____</strong>.</p>

        <div class="signature-section">
          <div class="signature-field">
            <label>Signature:</label>
            <div class="signature-canvas-container">
              <canvas id="signatureCanvas" class="signature-canvas"></canvas>
              <span class="signature-placeholder" id="sigPlaceholder">Click here to sign</span>
            </div>
            <button type="button" class="clear-sig-btn" onclick="clearSignature()">Clear Signature</button>
          </div>
          <div class="date-field">
            <label for="sigDate">Date:</label>
            <input type="date" id="sigDate" name="sigDate" required>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
