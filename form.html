<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate of Service</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script>
    // Simple auth check - if no cookie, redirect to login
    if (!document.cookie.includes('user_email')) {
      window.location.href = '/';
    }
  </script>
  <div class="container">
    <div class="top-nav">
      <a href="#" class="nav-link cancel" onclick="cancelForm(event)">Cancel</a>
      <input type="file" id="jsonFileInput" accept=".json" style="display: none;" onchange="loadJSONFile(event)">
      <button onclick="document.getElementById('jsonFileInput').click()" class="nav-link" style="margin-left: 10px;">Upload JSON</button>
    </div>
    <div class="header">
      <h1>Certificate of Service</h1>
    </div>

    <form id="cosForm">
      <div class="section">
        <div class="section-title">Personal Information</div>
        <div class="form-row">
          <div class="form-group">
            <label for="month">For the Month of:</label>
            <select id="month" name="month" required>
              <option value="">Select Month</option>
              <option value="January">January</option>
              <option value="February">February</option>
              <option value="March">March</option>
              <option value="April">April</option>
              <option value="May">May</option>
              <option value="June">June</option>
              <option value="July">July</option>
              <option value="August">August</option>
              <option value="September">September</option>
              <option value="October">October</option>
              <option value="November">November</option>
              <option value="December">December</option>
            </select>
          </div>
          <div class="form-group">
            <label for="year">Year:</label>
            <input type="number" id="year" name="year" min="2020" max="2040" value="2026" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="position">Position:</label>
            <input type="text" id="position" name="position" placeholder="Enter your position" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="college">College/School of:</label>
            <input type="text" id="college" name="college" placeholder="Enter college/school name" required>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Service Activities</div>
        <div class="activities-container" id="activitiesContainer">
          <div class="activity-card" data-index="0">
            <button type="button" class="remove-btn" onclick="removeActivity(this)" style="display: none;">&times;</button>
            <div class="form-row">
              <div class="form-group">
                <label>Activities (research, extension, etc.):</label>
                <input type="text" name="activity[]" placeholder="Describe the activity" required>
              </div>
              <div class="form-group" style="max-width: 200px;">
                <label>Hours per Week:</label>
                <input type="number" name="hours[]" min="0" max="168" placeholder="0" required>
              </div>
            </div>
          </div>
        </div>
        <button type="button" class="add-activity-btn" onclick="addActivity()">
          <span>+</span> Add Another Activity
        </button>
      </div>

      <div class="section">
        <div class="section-title">Summary</div>
        <div class="form-row">
          <div class="form-group">
            <label for="totalHours">Total Hours for the Month:</label>
            <input type="number" id="totalHours" name="totalHours" placeholder="Auto-calculated" readonly>
          </div>
        </div>
      </div>

      <div class="declaration">
        <div class="declaration-field">
          <label>I hereby certify upon my honor that I have rendered full service for the month of:</label>
          <input type="text" id="declarationMonth" name="declarationMonth" placeholder="Enter month (e.g., October)" required>
        </div>
        <p id="declarationText">I hereby certify upon my honor that I have rendered full service for the month of <strong id="declarationPreview">_____</strong>.</p>

        <div class="signature-section">
          <div class="signature-field">
            <label>Signature:</label>
            <div class="signature-canvas-container">
              <canvas id="signatureCanvas" class="signature-canvas"></canvas>
              <span class="signature-placeholder" id="sigPlaceholder">Click here to sign</span>
            </div>
            <button type="button" class="clear-sig-btn" onclick="clearSignature()">Clear Signature</button>
          </div>
          <div class="signature-field">
            <label>Printed Name:</label>
            <input type="text" id="printedName" name="printedName" placeholder="Enter your name" required>
          </div>
          <div class="date-field">
            <label for="sigDate">Date:</label>
            <input type="date" id="sigDate" name="sigDate" required>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
        <button type="button" class="btn btn-secondary" onclick="saveDraft()">Save as Draft</button>
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </div>

  <script src="js/script.js"></script>
  <script>
    // Check if we're editing a draft
    const urlParams = new URLSearchParams(window.location.search);
    const draftId = urlParams.get('draft');

    if (draftId) {
      // Load draft data
      fetch(`/api/drafts/${draftId}`)
        .then(res => res.json())
        .then(draft => {
          // Populate form fields
          document.getElementById('month').value = draft.month || '';
          document.getElementById('year').value = draft.year || 2026;
          document.getElementById('name').value = draft.name || '';
          document.getElementById('position').value = draft.position || '';
          document.getElementById('college').value = draft.college || '';
          document.getElementById('totalHours').value = draft.total_hours || '';
          document.getElementById('declarationMonth').value = draft.declaration_month || '';
          document.getElementById('sigDate').value = draft.submission_date || '';

          // Load activities
          const container = document.getElementById('activitiesContainer');
          container.innerHTML = '';
          if (draft.activities && draft.activities.length > 0) {
            draft.activities.forEach((activity, index) => {
              const hours = draft.hoursPerWeek && draft.hoursPerWeek[index] ? draft.hoursPerWeek[index] : '';
              const card = document.createElement('div');
              card.className = 'activity-card';
              card.dataset.index = index;
              card.innerHTML = `
                <button type="button" class="remove-btn" onclick="removeActivity(this)">&times;</button>
                <div class="form-row">
                  <div class="form-group">
                    <label>Activities (research, extension, etc.):</label>
                    <input type="text" name="activity[]" value="${activity}" required>
                  </div>
                  <div class="form-group" style="max-width: 200px;">
                    <label>Hours per Week:</label>
                    <input type="number" name="hours[]" min="0" max="168" value="${hours}" oninput="calculateTotal()" required>
                  </div>
                </div>
              `;
              container.appendChild(card);
            });
            updateRemoveButtons();
            calculateTotal();
          }

          // Update declaration preview
          const preview = document.getElementById('declarationPreview');
          if (draft.declaration_month) {
            preview.textContent = draft.declaration_month;
          }

          // Change form title to indicate editing
          document.querySelector('.header h1').textContent = 'Edit Draft';
        })
        .catch(err => console.error('Error loading draft:', err));
    }

    function cancelForm(e) {
      e.preventDefault();
      if (confirm('Are you sure you want to cancel? Any unsaved changes will be lost.')) {
        window.location.href = 'dashboard.html';
      }
    }

    function loadJSONFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);

          // Fill personal information
          if (data.month) document.getElementById('month').value = data.month;
          if (data.year) document.getElementById('year').value = data.year;
          if (data.name) document.getElementById('name').value = data.name;
          if (data.position) document.getElementById('position').value = data.position;
          if (data.college) document.getElementById('college').value = data.college;
          if (data.totalHours) document.getElementById('totalHours').value = data.totalHours;
          if (data.declarationMonth) {
            document.getElementById('declarationMonth').value = data.declarationMonth;
            document.getElementById('declarationPreview').textContent = data.declarationMonth;
          }
          if (data.submissionDate) document.getElementById('sigDate').value = data.submissionDate;

          // Fill activities
          if (data.activities && data.activities.length > 0) {
            const container = document.getElementById('activitiesContainer');
            container.innerHTML = '';
            data.activities.forEach((activity, index) => {
              const hours = data.hoursPerWeek && data.hoursPerWeek[index] ? data.hoursPerWeek[index] : '';
              const card = document.createElement('div');
              card.className = 'activity-card';
              card.dataset.index = index;
              card.innerHTML = `
                <button type="button" class="remove-btn" onclick="removeActivity(this)">&times;</button>
                <div class="form-row">
                  <div class="form-group">
                    <label>Activities (research, extension, etc.):</label>
                    <input type="text" name="activity[]" value="${activity}" required>
                  </div>
                  <div class="form-group" style="max-width: 200px;">
                    <label>Hours per Week:</label>
                    <input type="number" name="hours[]" min="0" max="168" value="${hours}" oninput="calculateTotal()" required>
                  </div>
                </div>
              `;
              container.appendChild(card);
            });
            updateRemoveButtons();
            calculateTotal();
          }

          alert('Form loaded successfully from JSON file!');
        } catch (error) {
          alert('Error reading JSON file. Please make sure it is a valid JSON file.');
          console.error('JSON load error:', error);
        }
      };
      reader.readAsText(file);

      // Reset file input so the same file can be uploaded again
      event.target.value = '';
    }
  </script>
</body>
</html>
