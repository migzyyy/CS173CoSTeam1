<!DOCTYPE html>
<html lang="en">
<head>

  <title>Past Entries - Certificate of Service</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script>
    // Simple auth check - skip on localhost
    if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
      if (!document.cookie.includes('user_email')) {
        window.location.href = '/';
      }
    }
  </script>
  <div class="container">
    <a href="form.html" class="back-link">← Back to Form</a>

      <h1>Past Entries</h1>
    </div>

    <div id="entriesContainer">
      <p class="loading">Loading entries...</p>
    </div>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
