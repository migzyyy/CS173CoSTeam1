<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Certificate of Service</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a href="drafts.html" class="nav-link">View Drafts</a>
      <a href="/api/logout" class="nav-link">Log Out</a>
    </nav>
    <div class="header">
      <h1>Certificate of Service</h1>
    </div>

    <div class="action-buttons" style="margin-bottom: 30px; justify-content: center;">
      <button type="button" class="btn btn-primary" onclick="window.location.href='form.html'">Create New Form</button>
    </div>

    <div class="section">
      <div class="section-title">Submitted Entries</div>
      <div id="entriesContainer">
        <p class="loading">Loading entries...</p>
      </div>
    </div>
  </div>

  <script>
    // Simple auth check - if no cookie, redirect to login
    if (!document.cookie.includes('user_email')) {
      window.location.href = '/';
    }
  </script>
  <script src="js/dashboard.js"></script>
</body>
</html>
