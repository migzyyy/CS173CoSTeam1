<style>
    .burger-menu {
        position: absolute;
        top: 20px;
        left: 20px;

    }

    .burger-menu span {
        display: block;
        width: 25px;
        height: 3px;
        background-color: #333;
        margin: 5px 0;
        transition: 0.3s; /* Smooth animation for later */

        margin-top: 100px; /* Pushes it down so it "hangs" below the top area */

    .nav-box {

        border-radius: 4px;

    }
